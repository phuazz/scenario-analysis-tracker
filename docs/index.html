<title>Signal Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #fafafa;
  color: #1a1a1a;
  line-height: 1.5;
  font-size: 14px;
}
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
header { margin-bottom: 24px; border-bottom: 1px solid #e5e5e5; padding-bottom: 16px; }
h1 { font-size: 22px; font-weight: 600; color: #111; }
.subtitle { color: #666; font-size: 13px; margin-top: 4px; }
.meta-row { display: flex; gap: 24px; margin-top: 12px; font-size: 12px; color: #555; }
.meta-row span { display: inline-flex; align-items: center; gap: 6px; }

.tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid #e5e5e5; }
.tab {
  padding: 10px 18px; cursor: pointer; border-bottom: 2px solid transparent;
  font-size: 13px; color: #666; user-select: none;
}
.tab.active { color: #111; border-bottom-color: #2563eb; font-weight: 500; }
.tab:hover:not(.active) { color: #333; }

.panel { display: none; }
.panel.active { display: block; }

table { width: 100%; border-collapse: collapse; background: white;
  border: 1px solid #e5e5e5; border-radius: 6px; overflow: hidden; }
th { background: #f5f5f5; padding: 10px 12px; text-align: left;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
  color: #555; font-weight: 600; border-bottom: 1px solid #e5e5e5; }
td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 13px;
  vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr.signal-row { cursor: pointer; transition: background 0.1s; }
tr.signal-row:hover { background: #f8f9fb; }

.gate-pill { display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; }
.gate-act { background: #d1fae5; color: #065f46; }
.gate-monitor { background: #fef3c7; color: #92400e; }
.gate-ignore { background: #fee2e2; color: #991b1b; }

.status-pill { display: inline-block; padding: 2px 6px; border-radius: 3px;
  font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.status-active { background: #dbeafe; color: #1e40af; }
.status-matured { background: #e5e7eb; color: #374151; }
.status-killed { background: #fce7f3; color: #9d174d; }

.num-pos { color: #047857; font-weight: 500; }
.num-neg { color: #b91c1c; font-weight: 500; }
.num-mute { color: #888; }

.drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  display: none; z-index: 10;
}
.drawer-overlay.open { display: block; }
.drawer {
  position: fixed; right: 0; top: 0; bottom: 0; width: 720px; max-width: 95vw;
  background: white; box-shadow: -4px 0 24px rgba(0,0,0,0.1);
  overflow-y: auto; padding: 24px; z-index: 11;
  transform: translateX(100%); transition: transform 0.2s ease;
}
.drawer.open { transform: translateX(0); }
.drawer-close { float: right; cursor: pointer; font-size: 20px; color: #666;
  background: none; border: none; padding: 4px 8px; }
.drawer h2 { font-size: 18px; margin-bottom: 4px; }
.drawer .source { color: #666; font-size: 12px; margin-bottom: 16px; }
.drawer h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em;
  color: #555; margin: 20px 0 8px; font-weight: 600; }

.fr-table { font-size: 12px; margin-top: 8px; }
.fr-table th, .fr-table td { padding: 6px 8px; text-align: right; }
.fr-table th:first-child, .fr-table td:first-child { text-align: left; }
.row-elapsed { background: #f8f9fb; }
.row-pending td { color: #999; }
.col-published { color: #1e40af; font-style: italic; }
.col-published-header { color: #1e40af; }
.divergence-note { font-size: 11px; color: #666; margin-top: 6px; font-style: italic; }

.notes-md { background: #fafafa; padding: 16px; border-radius: 6px;
  border: 1px solid #eee; margin-top: 8px; font-size: 13px; line-height: 1.6;
  white-space: pre-wrap; font-family: inherit; }

.empty-state { padding: 60px 20px; text-align: center; color: #888;
  background: white; border: 1px dashed #ddd; border-radius: 6px; }

.summary-cards { display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 20px; }
.card { background: white; border: 1px solid #e5e5e5; border-radius: 6px;
  padding: 16px; }
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
  color: #666; margin-bottom: 6px; }
.card-value { font-size: 22px; font-weight: 600; color: #111; }
.card-sub { font-size: 11px; color: #888; margin-top: 4px; }
</style>

// Standalone-dev fallback: if no signals injected, try fetch
async function loadSignals() {
  if (SIGNALS && SIGNALS.length > 0) return SIGNALS;
  try {
    const r = await fetch('data/signals_compiled.json');
    if (r.ok) return await r.json();
  } catch (e) { /* ignore */ }
  return [];
}

const HORIZONS = ['1M','2M','3M','4M','5M','6M','1Y'];

function fmtPct(v, signed=true) {
  if (v === null || v === undefined) return '<span class="num-mute">—</span>';
  const cls = v > 0 ? 'num-pos' : v < 0 ? 'num-neg' : 'num-mute';
  const sign = (signed && v > 0) ? '+' : '';
  return `<span class="${cls}">${sign}${v.toFixed(1)}%</span>`;
}

function gatePill(score) {
  if (!score) return '';
  const action = score.action || 'monitor';
  const cls = action === 'act' ? 'gate-act'
    : action === 'ignore' ? 'gate-ignore' : 'gate-monitor';
  return `<span class="gate-pill ${cls}">${action.toUpperCase()} ${score.total ?? ''}/10</span>`;
}

function statusPill(status) {
  const cls = `status-${status || 'active'}`;
  return `<span class="status-pill ${cls}">${status || 'active'}</span>`;
}

function daysElapsed(signalDate) {
  const sd = new Date(signalDate);
  const today = new Date();
  return Math.floor((today - sd) / (1000*60*60*24));
}

function renderSignalRow(sig) {
  const ph = sig.preferred_horizon || '4M';
  const exp = sig.forward_returns?.[ph] || {};
  const act = sig.actuals?.[ph] || {};
  const evl = sig.evaluation?.[ph] || {};
  const elapsed = daysElapsed(sig.signal_date);

  let actualDisplay;
  if (evl.status === 'matured') {
    actualDisplay = fmtPct(evl.actual_pct);
  } else if (act.current_return_pct !== null && act.current_return_pct !== undefined) {
    actualDisplay = `${fmtPct(act.current_return_pct)} <span class="num-mute">(MTM)</span>`;
  } else {
    actualDisplay = '<span class="num-mute">—</span>';
  }

  return `<tr class="signal-row" data-id="${sig.id}">
    <td>${sig.signal_date}<div style="font-size:11px;color:#888">${elapsed}d ago</div></td>
    <td>
      <div style="font-weight:500">${sig.signal_name}</div>
      <div style="font-size:11px;color:#666">${sig.source} · ${sig.asset?.name || sig.asset?.ticker}</div>
    </td>
    <td>${ph}</td>
    <td>${fmtPct(exp.mean)}<div style="font-size:11px;color:#888">med ${fmtPct(exp.median, false)} · ${exp.pct_pos}%↑</div></td>
    <td>${actualDisplay}</td>
    <td>${gatePill(sig.credibility_score)}</td>
    <td>${statusPill(sig.status)}</td>
  </tr>`;
}

function renderTable(signals) {
  if (!signals.length) {
    return '<div class="empty-state">No signals to display.</div>';
  }
  return `<table>
    <thead><tr>
      <th>Signal Date</th><th>Signal</th><th>Horizon</th>
      <th>Expected (mean)</th><th>Actual / MTM</th>
      <th>Gate</th><th>Status</th>
    </tr></thead>
    <tbody>${signals.map(renderSignalRow).join('')}</tbody>
  </table>`;
}

function renderSummary(signals) {
  const active = signals.filter(s => s.status === 'active');
  const matured = signals.filter(s => s.status === 'matured');
  const actCount = signals.filter(s => s.credibility_score?.action === 'act').length;
  const ignoreCount = signals.filter(s => s.credibility_score?.action === 'ignore').length;

  return `
    <div class="card"><div class="card-label">Total Signals</div>
      <div class="card-value">${signals.length}</div>
      <div class="card-sub">${active.length} active · ${matured.length} matured</div></div>
    <div class="card"><div class="card-label">Action Gate</div>
      <div class="card-value">${actCount}</div>
      <div class="card-sub">scoring ≥7 / 10</div></div>
    <div class="card"><div class="card-label">Below Threshold</div>
      <div class="card-value">${ignoreCount}</div>
      <div class="card-sub">scoring &lt;5 / 10</div></div>
    <div class="card"><div class="card-label">Sources</div>
      <div class="card-value">${new Set(signals.map(s => s.source)).size}</div>
      <div class="card-sub">distinct providers</div></div>
  `;
}

function renderDrawer(sig) {
  const fr = sig.forward_returns || {};
  const act = sig.actuals || {};
  const evl = sig.evaluation || {};

  const rr = sig.realised_returns || {};
  const hasPublished = Object.keys(rr).length > 0;
  const frRows = HORIZONS.map(h => {
    const r = fr[h] || {};
    const a = act[h] || {};
    const e = evl[h] || {};
    const elapsed = a.elapsed;
    const actualVal = elapsed ? e.actual_pct : a.current_return_pct;
    const vsMean = elapsed && e.vs_mean !== undefined ? e.vs_mean : null;
    const cls = elapsed ? 'row-elapsed' : 'row-pending';
    const publishedVal = rr[h];
    let flag = '';
    if (e.exceeded_max_gain) flag = ' 🟢';
    else if (e.breached_max_loss) flag = ' 🔴';
    return `<tr class="${cls}">
      <td>${h}${flag}</td>
      <td>${fmtPct(r.mean)}</td>
      <td>${fmtPct(r.median, false)}</td>
      <td>${r.pct_pos ?? '—'}%</td>
      <td>${fmtPct(r.max_loss, false)}</td>
      <td>${fmtPct(r.max_gain)}</td>
      <td class="col-published">${publishedVal !== undefined && publishedVal !== null ? fmtPct(publishedVal) : '<span class="num-mute">—</span>'}</td>
      <td>${actualVal !== null && actualVal !== undefined ? fmtPct(actualVal) : '<span class="num-mute">—</span>'}</td>
      <td>${vsMean !== null ? fmtPct(vsMean) : '<span class="num-mute">—</span>'}</td>
    </tr>`;
  }).join('');

  // Footnote: surface the published-vs-computed gap at the preferred horizon
  // when both numbers exist. This makes provider/data-source divergences visible.
  let divergenceNote = '';
  if (hasPublished) {
    const ph = sig.preferred_horizon;
    const pub = rr[ph];
    const e = evl[ph] || {};
    if (pub !== undefined && pub !== null && e.actual_pct !== undefined && e.actual_pct !== null) {
      const gap = (e.actual_pct - pub).toFixed(2);
      divergenceNote = `<div class="divergence-note">At ${ph}: provider published ${pub.toFixed(1)}% vs computed ${e.actual_pct.toFixed(2)}% (gap ${gap > 0 ? '+' : ''}${gap} pt). Gap reflects index price-return vs the provider's underlying series (e.g. total return, currency adjustment, or different rebalancing).</div>`;
    }
  }

  const cs = sig.credibility_score || {};
  const csRows = [
    ['Sample size', cs.sample_size],
    ['T-stat', cs.t_stat],
    ['Tail asymmetry', cs.tail_asymmetry],
    ['Entry-point fit', cs.entry_point],
    ['Recent performance', cs.recent_performance],
  ].map(([k,v]) => `<tr><td>${k}</td><td style="text-align:right">${v ?? '—'}/2</td></tr>`).join('');

  const ctx = sig.context || {};
  const ctxRows = Object.entries(ctx).map(([k,v]) =>
    `<tr><td>${k.replace(/_/g,' ')}</td><td style="text-align:right">${v}</td></tr>`
  ).join('');

  return `
    <button class="drawer-close" onclick="closeDrawer()">×</button>
    <h2>${sig.signal_name}</h2>
    <div class="source">${sig.source} · ${sig.signal_date} · ${sig.asset?.name || ''} (${sig.asset?.ticker || ''})</div>
    <div style="margin:12px 0">${gatePill(cs)} ${statusPill(sig.status)}
      <span style="color:#666;font-size:12px;margin-left:8px">
        Sample N=${sig.sample_size || '—'} · Preferred horizon ${sig.preferred_horizon || '—'}
      </span>
    </div>

    <h3>Forward Returns vs Actuals</h3>
    <table class="fr-table">
      <thead><tr>
        <th>Horizon</th><th>Mean</th><th>Median</th><th>%↑</th>
        <th>Avg Max Loss</th><th>Avg Max Gain</th>
        <th class="col-published-header">Published</th>
        <th>Actual / MTM</th><th>vs Mean</th>
      </tr></thead>
      <tbody>${frRows}</tbody>
    </table>
    ${divergenceNote}

    <h3>Credibility Gate Breakdown</h3>
    <table class="fr-table"><tbody>${csRows}
      <tr style="font-weight:600;border-top:2px solid #ddd">
        <td>Total</td><td style="text-align:right">${cs.total ?? '—'}/10</td>
      </tr>
    </tbody></table>

    <h3>Context at Signal Time</h3>
    <table class="fr-table"><tbody>${ctxRows || '<tr><td>—</td></tr>'}</tbody></table>

    <h3>Notes</h3>
    <div class="notes-md">${escapeHtml(sig.notes_markdown || '')}</div>
  `;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function openDrawer(id) {
  const sig = window.__SIGNALS_DATA.find(s => s.id === id);
  if (!sig) return;
  document.getElementById('drawer').innerHTML = renderDrawer(sig);
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}
window.closeDrawer = closeDrawer;

document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.panel).classList.add('active');
  });
});

(async function init() {
  const signals = await loadSignals();
  window.__SIGNALS_DATA = signals;

  document.getElementById('meta-row').innerHTML =
    `<span>${signals.length} signals tracked</span>
     <span>Last build: ${signals[0]?.computed_at || '—'}</span>`;

  document.getElementById('summary-cards').innerHTML = renderSummary(signals);
  document.getElementById('panel-active').innerHTML =
    renderTable(signals.filter(s => s.status === 'active'));
  document.getElementById('panel-matured').innerHTML =
    renderTable(signals.filter(s => s.status === 'matured'));
  document.getElementById('panel-all').innerHTML = renderTable(signals);

  document.querySelectorAll('.signal-row').forEach(r => {
    r.addEventListener('click', () => openDrawer(r.dataset.id));
  });
})();
</script>
